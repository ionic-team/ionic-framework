name: 'Test Angular E2E'
description: 'Test Angular E2E'
inputs:
  app:
    description: 'The specific test application'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24.x
    - uses: ./.github/workflows/actions/download-archive
      with:
        name: ionic-core
        path: ./core
        filename: CoreBuild.zip
    - uses: ./.github/workflows/actions/download-archive
      with:
        name: ionic-angular
        path: ./packages/angular
        filename: AngularBuild.zip
    - uses: ./.github/workflows/actions/download-archive
      with:
        name: ionic-angular-server
        path: ./packages/angular-server
        filename: AngularServerBuild.zip
    - name: 🧪 Create Test App
      run: ./build.sh ${{ inputs.app }}
      shell: bash
      working-directory: ./packages/angular/test
    - name: 🕸️ Install Dependencies
      # --legacy-peer-deps: the ng22 app pins @angular/cli@^22 while @angular-eslint@21
      # (latest published) peer-requires @angular/cli ">=21 <22". Remove once @angular-eslint@22 ships.
      run: npm install --legacy-peer-deps
      shell: bash
      working-directory: ./packages/angular/test/build/${{ inputs.app }}
    - name: 📦 Install Playwright Browsers
      run: npx playwright install chromium
      shell: bash
      working-directory: ./packages/angular/test/build/${{ inputs.app }}
    - name: 🔄 Sync Built Changes
      run: npm run sync
      shell: bash
      working-directory: ./packages/angular/test/build/${{ inputs.app }}
    - name: 🧪 Run Tests
      run: npm run test
      shell: bash
      working-directory: ./packages/angular/test/build/${{ inputs.app }}
