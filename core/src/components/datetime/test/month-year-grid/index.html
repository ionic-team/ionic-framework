<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Datetime - Month/Year Grid Picker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <link href="../../../../../css/ionic.bundle.css" rel="stylesheet" />
    <link href="../../../../../scripts/testing/styles.css" rel="stylesheet" />
    <script src="../../../../../scripts/testing/scripts.js"></script>
    <script type="module" src="../../../../../dist/ionic/ionic.esm.js"></script>
    <style>
      .grid {
        display: flex;
        flex-wrap: wrap;
      }

      .grid-item {
        margin-bottom: 20px;
        margin-right: 20px;
      }

      h2 {
        font-size: 12px;
        font-weight: normal;

        color: #6f7378;

        margin-top: 10px;
        margin-left: 5px;
      }

      ion-datetime {
        box-shadow: 0px 8px 16px 0 rgba(0, 0, 0, 0.25);
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <ion-app>
      <ion-header translucent="true">
        <ion-toolbar>
          <ion-title>Datetime - Month/Year Grid Picker</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <div class="grid">
          <div class="grid-item">
            <h2>Wheel (Default)</h2>
            <ion-datetime
              locale="en-US"
              id="wheel"
              presentation="date"
              value="2022-06-15"
              month-year-picker-view="wheel"
            ></ion-datetime>
          </div>

          <div class="grid-item">
            <h2>Grid</h2>
            <ion-datetime
              locale="en-US"
              id="grid"
              presentation="date"
              value="2022-06-15"
              month-year-picker-view="grid"
            ></ion-datetime>
          </div>

          <div class="grid-item">
            <h2>Grid - With Min/Max</h2>
            <ion-datetime
              locale="en-US"
              id="gridMinMax"
              presentation="date"
              value="2022-06-15"
              month-year-picker-view="grid"
              min="2022-03-01"
              max="2022-10-31"
            ></ion-datetime>
          </div>

          <div class="grid-item">
            <h2>Grid - With monthValues</h2>
            <ion-datetime
              locale="en-US"
              id="gridMonthValues"
              presentation="date"
              value="2022-06-15"
              month-year-picker-view="grid"
              month-values="2,4,6,8,10,12"
            ></ion-datetime>
          </div>

          <div class="grid-item">
            <h2>Grid - With Buttons</h2>
            <ion-datetime
              locale="en-US"
              id="gridWithButtons"
              presentation="date"
              value="2022-06-15"
              month-year-picker-view="grid"
              show-default-buttons="true"
            ></ion-datetime>
          </div>

          <div class="grid-item">
            <h2>Grid - Month/Year Presentation</h2>
            <ion-datetime
              locale="en-US"
              id="gridMonthYear"
              presentation="month-year"
              value="2022-06-15"
              month-year-picker-view="grid"
            ></ion-datetime>
          </div>
        </div>
      </ion-content>
    </ion-app>
  </body>
</html>
