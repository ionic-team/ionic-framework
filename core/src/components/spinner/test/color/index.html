<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Spinner - Color</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link href="../../../../../css/ionic.bundle.css" rel="stylesheet" />
    <link href="../../../../../scripts/testing/styles.css" rel="stylesheet" />
    <script src="../../../../../scripts/testing/scripts.js"></script>
    <script nomodule src="../../../../../dist/ionic/ionic.js"></script>
    <script type="module" src="../../../../../dist/ionic/ionic.esm.js"></script>
    <style>
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 150px), 1fr));
        gap: 20px;
        margin-top: 40px;
      }
    </style>
  </head>

  <body>
    <ion-app>
      <ion-header>
        <ion-toolbar>
          <ion-title>Spinner - Color</ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-content id="content">
        <div class="grid">
          <div class="grid-item">
            <ion-spinner name="lines" color="primary"></ion-spinner>
            <p>Primary</p>
          </div>

          <div class="grid-item">
            <ion-spinner name="lines-small" color="secondary"></ion-spinner>
            <p>Secondary</p>
          </div>

          <div class="grid-item">
            <ion-spinner name="lines-sharp" color="tertiary"></ion-spinner>
            <p>Tertiary</p>
          </div>

          <div class="grid-item">
            <ion-spinner name="lines-sharp-small" color="success"></ion-spinner>
            <p>Success</p>
          </div>

          <div class="grid-item">
            <ion-spinner name="circular" color="warning"></ion-spinner>
            <p>Warning</p>
          </div>

          <div class="grid-item">
            <ion-spinner name="dots" color="danger"></ion-spinner>
            <p>Danger</p>
          </div>

          <div class="grid-item">
            <ion-spinner name="bubbles" color="light"></ion-spinner>
            <p>Light</p>
          </div>

          <div class="grid-item">
            <ion-spinner name="circles" color="medium"></ion-spinner>
            <p>Medium</p>
          </div>

          <div class="grid-item">
            <ion-spinner name="crescent" color="dark"></ion-spinner>
            <p>Dark</p>
          </div>
        </div>
      </ion-content>
    </ion-app>
  </body>
</html>
