<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Spinner - Size</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link href="../../../../../css/ionic.bundle.css" rel="stylesheet" />
    <link href="../../../../../scripts/testing/styles.css" rel="stylesheet" />
    <script src="../../../../../scripts/testing/scripts.js"></script>
    <script nomodule src="../../../../../dist/ionic/ionic.js"></script>
    <script type="module" src="../../../../../dist/ionic/ionic.esm.js"></script>
    <style>
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 150px), 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }
    </style>
  </head>

  <body>
    <ion-app>
      <ion-header>
        <ion-toolbar>
          <ion-title>Spinner - Size</ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-content id="content"> </ion-content>
    </ion-app>

    <script>
      const sections = [
        {
          id: 'lines-container',
          spinners: ['lines', 'lines-small', 'lines-sharp', 'lines-sharp-small'],
        },
        {
          id: 'radial-container',
          spinners: ['circular', 'crescent'],
        },
        {
          id: 'dots-container',
          spinners: ['bubbles', 'circles', 'dots'],
        },
      ];

      const spinnerSizes = [
        { value: undefined, label: 'Default' },
        { value: 'xsmall', label: 'Extra Small' },
        { value: 'small', label: 'Small' },
        { value: 'medium', label: 'Medium' },
        { value: 'large', label: 'Large' },
        { value: 'xlarge', label: 'Extra Large' },
      ];

      // Helper to turn 'lines-sharp-small' into 'Lines Sharp Small'
      const formatTitle = (str) => {
        return str
          .split('-')
          .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
          .join(' ');
      };

      const contentEl = document.getElementById('content');

      sections.forEach((section) => {
        const sectionDiv = document.createElement('div');
        sectionDiv.id = section.id;

        section.spinners.forEach((spinnerName) => {
          const heading = document.createElement('h2');
          heading.textContent = formatTitle(spinnerName);
          sectionDiv.appendChild(heading);

          const grid = document.createElement('div');
          grid.className = 'grid';

          spinnerSizes.forEach((size) => {
            const item = document.createElement('div');
            item.className = 'grid-item';

            const spinner = document.createElement('ion-spinner');
            spinner.setAttribute('name', spinnerName);
            if (size.value) {
              spinner.setAttribute('size', size.value);
            }

            const label = document.createElement('p');
            label.textContent = size.label;

            item.appendChild(spinner);
            item.appendChild(label);
            grid.appendChild(item);
          });

          sectionDiv.appendChild(grid);
        });

        contentEl.appendChild(sectionDiv);
      });
    </script>
  </body>
</html>
