<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Select Option - Label Placement</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link href="../../../../../css/ionic.bundle.css" rel="stylesheet" />
    <link href="../../../../../scripts/testing/styles.css" rel="stylesheet" />
    <script src="../../../../../scripts/testing/scripts.js"></script>
    <script nomodule src="../../../../../dist/ionic/ionic.js"></script>
    <script type="module" src="../../../../../dist/ionic/ionic.esm.js"></script>
  </head>

  <body>
    <ion-app>
      <ion-header>
        <ion-toolbar>
          <ion-title>Select Option - Label Placement</ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-content class="test-content">
        <ion-list></ion-list>
      </ion-content>

      <script>
        const INTERFACES = ['alert', 'popover', 'modal'];
        const JUSTIFY_VARIANTS = ['start', 'end', 'space-between'];
        const LABEL_PLACEMENTS = ['start', 'end'];
        const FIRST_OPTION_VALUE = `${JUSTIFY_VARIANTS[0]}-short`;

        const renderOptions = (labelPlacement) =>
          JUSTIFY_VARIANTS.flatMap((justify) => {
            const longLabel = `Justify ${justify} — ${'long label '.repeat(6).trim()}`;
            return [
              `<ion-select-option value="${justify}-short" label-placement="${labelPlacement}" justify="${justify}">Justify ${justify}</ion-select-option>`,
              `<ion-select-option value="${justify}-long" label-placement="${labelPlacement}" justify="${justify}">${longLabel}</ion-select-option>`,
            ];
          }).join('');

        const list = document.querySelector('ion-list');

        INTERFACES.forEach((interfaceName) => {
          const header = document.createElement('ion-list-header');
          header.innerHTML = `<ion-label>${interfaceName} interface</ion-label>`;
          list.appendChild(header);

          LABEL_PLACEMENTS.forEach((placement) => {
            const item = document.createElement('ion-item');
            item.innerHTML = `
              <ion-select
                interface="${interfaceName}"
                label="placement ${placement}"
                value="${FIRST_OPTION_VALUE}"
              >
                ${renderOptions(placement)}
              </ion-select>
            `;
            list.appendChild(item);
          });
        });
      </script>
    </ion-app>
  </body>
</html>
