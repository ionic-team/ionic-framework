<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Grid - Pull & Push (deprecated)</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link href="../../../../../css/ionic.bundle.css" rel="stylesheet" />
    <link href="../../../../../scripts/testing/styles.css" rel="stylesheet" />
    <script src="../../../../../scripts/testing/scripts.js"></script>
    <script nomodule src="../../../../../dist/ionic/ionic.js"></script>
    <script type="module" src="../../../../../dist/ionic/ionic.esm.js"></script>
  </head>

  <body>
    <ion-app>
      <ion-header>
        <ion-toolbar>
          <ion-title>Grid - Pull & Push (deprecated)</ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-content id="content" class="grid-demo">
        <h2 class="ion-padding-start">Push (deprecated)</h2>
        <ion-grid>
          <ion-row>
            <ion-col size="auto" push="1">
              <div>ion-col push 1</div>
            </ion-col>
            <ion-col size="auto" push="1">
              <div>ion-col push 1</div>
            </ion-col>
          </ion-row>
        </ion-grid>

        <h2 class="ion-padding-start">Push and Pull (deprecated)</h2>
        <ion-grid>
          <ion-row>
            <ion-col size="9" push="3">
              <div>ion-col push 3</div>
            </ion-col>
            <ion-col size="3" pull="9">
              <div>ion-col pull 9</div>
            </ion-col>
          </ion-row>
        </ion-grid>

        <ion-grid>
          <ion-row>
            <ion-col size="3" size-md="6" push="9" push-md="6">
              <div>ion-col size="3" size-md="6" push="9" push-md="6"</div>
            </ion-col>
            <ion-col size="9" size-md="6" pull="3" pull-md="6">
              <div>ion-col size="9" size-md="6" pull="3" pull-md="6"</div>
            </ion-col>
          </ion-row>
        </ion-grid>
      </ion-content>

      <style>
        .grid-demo ion-col div {
          background-color: #f7f7f7;
          border: 1px solid #ddd;
          font-size: 0.8em;
          padding: 10px 5px;
        }
      </style>
    </ion-app>
  </body>
</html>
